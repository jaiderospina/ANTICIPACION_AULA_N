<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1F4E79"/>
      <stop offset="50%" style="stop-color:#2E75B6"/>
      <stop offset="100%" style="stop-color:#0F6E56"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="900" height="200" fill="none" stroke="#ffffff22" stroke-width="1" rx="12"/>

  <!-- Shield icon left -->
  <g transform="translate(55,100)">
    <path d="M0,-45 L30,-35 L30,5 Q30,35 0,50 Q-30,35 -30,5 L-30,-35 Z" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
    <path d="M-10,0 L-3,8 L12,-10" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <!-- Main title -->
  <text x="450" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">30 TÉCNICAS DE EVALUACIÓN DE RIESGO</text>
  <text x="450" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#ffffffcc">ISO 31000:2018 · ISO/IEC 27001 · ISO/IEC 27032</text>
  <text x="450" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffffaa">Curso de Estado Mayor — CEM 2026 · Fuerza Aérea Colombiana</text>

  <!-- Bottom tag pills -->
  <rect x="180" y="160" width="120" height="24" rx="12" fill="#ffffff22"/>
  <text x="240" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">Ciberseguridad</text>

  <rect x="314" y="160" width="140" height="24" rx="12" fill="#ffffff22"/>
  <text x="384" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">Gestión del Riesgo</text>

  <rect x="468" y="160" width="150" height="24" rx="12" fill="#ffffff22"/>
  <text x="543" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">Infraestructura Crítica</text>

  <rect x="632" y="160" width="100" height="24" rx="12" fill="#ffffff22"/>
  <text x="682" y="177" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">Defensa Nacional</text>

  <!-- Shield icon right -->
  <g transform="translate(845,100)">
    <circle r="40" fill="none" stroke="#ffffff33" stroke-width="1"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#ffffff88">🛡️</text>
