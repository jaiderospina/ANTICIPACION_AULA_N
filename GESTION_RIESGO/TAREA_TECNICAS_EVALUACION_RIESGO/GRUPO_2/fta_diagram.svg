<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" width="800" height="420">
  <rect width="800" height="420" fill="#F8F9FC" rx="10"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#1F4E79">Técnica 10 — Árbol de Fallas (FTA)</text>
  <text x="400" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5F5E5A">Compromiso del Sistema de Defensa Aérea — FAC</text>

  <!-- TOP EVENT -->
  <rect x="270" y="60" width="260" height="44" rx="8" fill="#1F4E79" stroke="#0C447C" stroke-width="2"/>
  <text x="400" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">COMPROMISO TOTAL</text>
  <text x="400" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffffcc">Sistema Defensa Aérea</text>

  <!-- AND Gate -->
  <line x1="400" y1="104" x2="400" y2="128" stroke="#444441" stroke-width="1.5"/>
  <ellipse cx="400" cy="138" rx="20" ry="14" fill="#EBF3FB" stroke="#185FA5" stroke-width="2"/>
  <text x="400" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#185FA5">AND</text>

  <!-- Level 1 branches -->
  <line x1="380" y1="138" x2="220" y2="185" stroke="#444441" stroke-width="1.5"/>
  <line x1="420" y1="138" x2="580" y2="185" stroke="#444441" stroke-width="1.5"/>

  <!-- Left branch: Falla Sistema Radar -->
  <rect x="120" y="185" width="200" height="40" rx="7" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.5"/>
  <text x="220" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#501313">Falla Sistema de Radar</text>
  <text x="220" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#791F1F">P = 0.12 / año</text>

  <!-- OR Gate left -->
  <line x1="220" y1="225" x2="220" y2="248" stroke="#444441" stroke-width="1.5"/>
  <ellipse cx="220" cy="258" rx="18" ry="12" fill="#FEF7E8" stroke="#BA7517" stroke-width="2"/>
  <text x="220" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#854F0B">OR</text>

  <line x1="202" y1="258" x2="120" y2="308" stroke="#444441" stroke-width="1.5"/>
  <line x1="220" y1="270" x2="220" y2="308" stroke="#444441" stroke-width="1.5"/>
  <line x1="238" y1="258" x2="320" y2="308" stroke="#444441" stroke-width="1.5"/>

  <!-- Basic events left -->
  <rect x="50" y="308" width="140" height="36" rx="6" fill="#EBF3FB" stroke="#378ADD" stroke-width="1"/>
  <text x="120" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#042C53">Ataque cibernético</text>
  <text x="120" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#042C53">al software ATC</text>
  <circle cx="120" cy="352" r="8" fill="#EBF3FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="120" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#185FA5">B1</text>

  <rect x="150" y="308" width="140" height="36" rx="6" fill="#EBF3FB" stroke="#378ADD" stroke-width="1"/>
  <text x="220" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#042C53">Falla de hardware</text>
  <text x="220" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#042C53">del transmisor</text>
  <circle cx="220" cy="352" r="8" fill="#EBF3FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="220" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#185FA5">B2</text>

  <rect x="250" y="308" width="140" height="36" rx="6" fill="#EBF3FB" stroke="#378ADD" stroke-width="1"/>
  <text x="320" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#042C53">Jamming</text>
  <text x="320" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#042C53">electromagnético</text>
  <circle cx="320" cy="352" r="8" fill="#EBF3FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="320" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#185FA5">B3</text>

  <!-- Right branch: Falla Comunicaciones -->
  <rect x="480" y="185" width="200" height="40" rx="7" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.5"/>
  <text x="580" y="201" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#501313">Falla Comunicaciones C2</text>
  <text x="580" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#791F1F">P = 0.08 / año</text>

  <!-- OR Gate right -->
  <line x1="580" y1="225" x2="580" y2="248" stroke="#444441" stroke-width="1.5"/>
  <ellipse cx="580" cy="258" rx="18" ry="12" fill="#FEF7E8" stroke="#BA7517" stroke-width="2"/>
  <text x="580" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#854F0B">OR</text>

  <line x1="562" y1="258" x2="480" y2="308" stroke="#444441" stroke-width="1.5"/>
  <line x1="598" y1="258" x2="680" y2="308" stroke="#444441" stroke-width="1.5"/>

  <!-- Basic events right -->
  <rect x="410" y="308" width="140" height="36" rx="6" fill="#EBF3FB" stroke="#378ADD" stroke-width="1"/>
  <text x="480" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#042C53">Ciberataque a</text>
  <text x="480" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#042C53">nodo C2 central</text>
  <circle cx="480" cy="352" r="8" fill="#EBF3FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="480" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#185FA5">B4</text>

  <rect x="610" y="308" width="140" height="36" rx="6" fill="#EBF3FB" stroke="#378ADD" stroke-width="1"/>
  <text x="680" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#042C53">Falla enlace satélite</text>
  <text x="680" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#042C53">de respaldo</text>
  <circle cx="680" cy="352" r="8" fill="#EBF3FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="680" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#185FA5">B5</text>

  <!-- Probability result -->
  <rect x="290" y="380" width="220" height="28" rx="6" fill="#1F4E79"/>
  <text x="400" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" font-weight="700">P(Evento Tope) = 0.12 × 0.08 = 0.0096/año</text>
  <text x="400" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffffaa">Corte mínimo crítico: {B1, B4}</text>
</svg>
